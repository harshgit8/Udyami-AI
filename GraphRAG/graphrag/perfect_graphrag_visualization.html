        .controls {
            position: fixed;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 1000;
            width: 200px;
        }
        
        .control-group {
            margin-bottom: 10px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .control-group input, .control-group select {
            width: 100%;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.9);
            color: black;
        }
        
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 0.9em;
            max-width: 300px;
            z-index: 1001;
            display: none;
        }
        
        #graph-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        .node {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
        }
        
        .link {
            stroke: #999;
            stroke-opacity: 0.6;
        }
        
        .node:hover {
            stroke-width: 3px;
        }
        
        .node.highlighted {
            stroke: #ff0;
            stroke-width: 4px;
        }
        
        .link.highlighted {
            stroke: #ff0;
            stroke-width: 3px;
            stroke-opacity: 1;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8em;
        }
    </style>

        console.log(`📊 Loaded ${nodes.length} nodes and ${links.length} links`);
        
        // Set up SVG
        const container = d3.select("#graph-container");
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const svg = container.append("svg")
            .attr("width", width)
            .attr("height", height);
        
        // Add zoom behavior
        const g = svg.append("g");
        const zoom = d3.zoom()
            .scaleExtent([0.1, 10])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        
        svg.call(zoom);
        
        // Set up force simulation
        let simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(80))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => d.size + 3));
        
        // Create links
        const link = g.append("g")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("class", "link")
            .style("stroke-width", d => Math.sqrt(d.weight * 2));
        
        // Create nodes
        const node = g.append("g")
            .selectAll("circle")
            .data(nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", d => d.size)
            .style("fill", d => d.color)
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        // Add labels for important nodes
        const label = g.append("g")
            .selectAll("text")
            .data(nodes.filter(d => d.size > 15)) // Only label highly connected nodes
            .enter().append("text")
            .text(d => d.name.length > 12 ? d.name.substring(0, 12) + "..." : d.name)
            .style("font-size", "10px")
            .style("fill", "white")
            .style("text-anchor", "middle")
            .style("pointer-events", "none")
            .style("text-shadow", "1px 1px 2px rgba(0,0,0,0.8)");
        
        // Tooltip
        const tooltip = d3.select("#tooltip");
        const status = d3.select("#status");
        
        // Node interactions
        node.on("mouseover", function(event, d) {
            tooltip.style("display", "block")
                .html(`<strong>${d.name}</strong><br/>Type: ${d.type}<br/>Connections: ${getNodeConnections(d.id)}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 10) + "px");
            
            // Highlight connected nodes and links
            highlightConnected(d);
            status.text(`Viewing: ${d.name}`);
        })
        .on("mouseout", function() {
            tooltip.style("display", "none");
            clearHighlights();
            status.text("Ready");
        })
        .on("click", function(event, d) {
            console.log("Node clicked:", d);
            // Center on clicked node
            const transform = d3.zoomIdentity
                .translate(width / 2 - d.x, height / 2 - d.y)
                .scale(1.5);
            svg.transition().duration(750).call(zoom.transform, transform);
        });
        
        // Simulation tick
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
            
            label
                .attr("x", d => d.x)
                .attr("y", d => d.y + 4);
        });
        
        // Helper functions
        function getNodeConnections(nodeId) {
            return links.filter(l => l.source.id === nodeId || l.target.id === nodeId).length;
        }
        
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        function highlightConnected(selectedNode) {
            const connectedNodes = new Set();
            const connectedLinks = new Set();
            
            links.forEach(link => {
                if (link.source.id === selectedNode.id || link.target.id === selectedNode.id) {
                    connectedLinks.add(link);
                    connectedNodes.add(link.source.id);
                    connectedNodes.add(link.target.id);
                }
            });
            
            node.classed("highlighted", d => connectedNodes.has(d.id));
            link.classed("highlighted", d => connectedLinks.has(d));
        }
        
        function clearHighlights() {
            node.classed("highlighted", false);
            link.classed("highlighted", false);
        }
        
        // Search functionality
        d3.select("#search-input").on("input", function() {
            const searchTerm = this.value.toLowerCase();
            
            node.style("opacity", d => {
                if (!searchTerm) return 1;
                return d.name.toLowerCase().includes(searchTerm) ? 1 : 0.2;
            });
            
            label.style("opacity", d => {
                if (!searchTerm) return 1;
                return d.name.toLowerCase().includes(searchTerm) ? 1 : 0.2;
            });
            
            status.text(searchTerm ? `Searching: ${searchTerm}` : "Ready");
        });
        
        // Type filter
        d3.select("#type-filter").on("change", function() {
            const selectedType = this.value;
            
            node.style("opacity", d => {
                if (!selectedType) return 1;
                return d.type === selectedType ? 1 : 0.2;
            });
            
            label.style("opacity", d => {
                if (!selectedType) return 1;
                return d.type === selectedType ? 1 : 0.2;
            });
            
            status.text(selectedType ? `Filtering: ${selectedType}` : "Ready");
        });
        
        // Force strength control
        d3.select("#force-slider").on("input", function() {
            const strength = -this.value;
            simulation.force("charge").strength(strength);
            simulation.alpha(0.3).restart();
            status.text(`Force: ${Math.abs(strength)}`);
        });
        
        // Window resize
        window.addEventListener("resize", () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
        
        console.log("✅ Perfect GraphRAG Visualization loaded successfully!");
        console.log(`📊 Nodes: ${nodes.length}, Links: ${links.length}`);
        status.text("✅ Visualization Ready!");
    </script>
